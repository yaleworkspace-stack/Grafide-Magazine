# ============================================================
# Grafide API — application-local.properties
# Active when:  mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# Targets a natively installed MongoDB on Windows (localhost).
# No Docker required. No Atlas connection string required.
# The frontend is served directly by Spring from ../Frontend/.
# ============================================================

# ── MongoDB ─────────────────────────────────────────────────
# Expects MongoDB 6+ running as a local Windows service.
# Start/stop via:  net start MongoDB  /  net stop MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/grafide

# ── JWT ─────────────────────────────────────────────────────
# Safe local-dev fallback — NEVER reuse this value in production.
jwt.secret=LOCAL-DEV-JWT-SECRET-CHANGE-BEFORE-ANY-DEPLOYMENT

# ── Cloudinary ──────────────────────────────────────────────
# Leave blank to store uploads on local disk under uploads/images/.
cloudinary.url=

# ── CORS ────────────────────────────────────────────────────
# Spring serves both API and frontend — only localhost origins needed.
grafide.cors.allowed-origins=http://localhost:8080

# ── Editor access code ──────────────────────────────────────
grafide.editor-code=LOCAL-DEV-EDITOR-CODE

# ── Base URL ────────────────────────────────────────────────
grafide.base-url=http://localhost:8080

# ── Static frontend ─────────────────────────────────────────
# Spring serves the sibling Frontend/ folder so a separate dev
# server is not needed. The SpaFallbackController forwards
# SPA routes (/article/**, /category/**, etc.) to index.html.
spring.web.resources.static-locations=file:../Frontend/
spring.mvc.static-path-pattern=/**