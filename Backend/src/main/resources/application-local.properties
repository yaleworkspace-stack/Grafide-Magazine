# ── Grafide Magazine — application-local.properties ────────────────────────────
# Used when running:  mvn spring-boot:run "-Dspring-boot.run.profiles=local"
# Safe dev-only defaults — NEVER deploy these values to production.

# MongoDB (native Windows service, no Docker)
spring.data.mongodb.uri=mongodb://localhost:27017/grafide

# JWT — dev-only secret (weak on purpose; rejected by prod startup check)
grafide.jwt.secret=grafide-local-dev-secret-do-not-use-in-production-ever-32chars+

# CORS — allow Live Server (5500) AND direct Spring access (8080)
# Both localhost and 127.0.0.1 variants included since browsers treat them differently
grafide.cors.origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://127.0.0.1:8080

# Editor registration code (dev convenience)
grafide.editor.code=dev-editor-code

# Base URL (used in password-reset email links)
grafide.base-url=http://localhost:8080

# Local image storage (Cloudinary not required locally)
grafide.storage.mode=local
grafide.storage.local-path=uploads/images

# Mail — disabled locally; reset tokens logged to console instead
grafide.mail.enabled=false

spring.security.user.name=disabled
spring.security.user.password=disabled
