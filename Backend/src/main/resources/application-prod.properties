# ── Grafide Magazine — application-prod.properties ─────────────────────────────
# Used automatically when SPRING_PROFILES_ACTIVE=prod (set in Render dashboard).
# Every secret is injected via environment variables — no fallbacks.
# The app REFUSES to start if JWT_SECRET is not set.

# MongoDB Atlas
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# JWT — no fallback; missing value = startup failure (intentional)
grafide.jwt.secret=${JWT_SECRET}

# CORS — your Render frontend URL
grafide.cors.origins=${GRAFIDE_CORS_ORIGINS}

# Editor registration code
grafide.editor.code=${GRAFIDE_EDITOR_CODE}

# Base URL (used in password-reset links)
grafide.base-url=${BASE_URL}

# Cloudinary image storage
grafide.storage.mode=cloudinary
cloudinary.url=${CLOUDINARY_URL}

# Mail (optional — reset links fall back to logs if absent)
grafide.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
grafide.mail.from=${MAIL_FROM:noreply@grafide.com}

# Shop — Paystack (live keys via env vars)
paystack.secret-key=${PAYSTACK_SECRET_KEY}
paystack.public-key=${PAYSTACK_PUBLIC_KEY}
grafide.shop.shipping-fee=${SHOP_SHIPPING_FEE:2500}
grafide.shop.currency=NGN
