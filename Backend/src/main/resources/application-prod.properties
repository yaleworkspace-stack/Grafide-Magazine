# ============================================================
# Grafide API — application-prod.properties
# Active when:  SPRING_PROFILES_ACTIVE=prod  (set in Dockerfile)
#
# Targets MongoDB Atlas via a connection string injected at
# runtime by Render as an environment variable.
# The frontend is hosted as a separate Render Static Site;
# Spring does NOT serve any static files in this profile.
# ============================================================

# ── MongoDB Atlas ───────────────────────────────────────────
# Must be set as SPRING_DATA_MONGODB_URI in Render environment.
# The app will fail to start if this variable is absent.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# ── JWT ─────────────────────────────────────────────────────
# Must be set as JWT_SECRET in Render environment.
# No fallback — the app will refuse to start without it,
# preventing accidental deployment with a weak or public key.
jwt.secret=${JWT_SECRET}

# ── Cloudinary ──────────────────────────────────────────────
# Must be set as CLOUDINARY_URL in Render environment.
# Without it, uploads fall back to container-local disk which
# is ephemeral and wiped on every redeploy.
cloudinary.url=${CLOUDINARY_URL:}

# ── CORS ────────────────────────────────────────────────────
# Must be set as GRAFIDE_CORS_ORIGINS in Render environment.
# Example value:  https://grafide-frontend.onrender.com
grafide.cors.allowed-origins=${GRAFIDE_CORS_ORIGINS}

# ── Editor access code ──────────────────────────────────────
# Must be set as GRAFIDE_EDITOR_CODE in Render environment.
grafide.editor-code=${GRAFIDE_EDITOR_CODE}

# ── Base URL ────────────────────────────────────────────────
# Must be set as BASE_URL in Render environment.
# Example value:  https://grafide-magazine-s4ol.onrender.com
grafide.base-url=${BASE_URL}

# ── Static files ────────────────────────────────────────────
# Disabled in prod — the frontend lives on its own Static Site.
# Spring only handles /api/** traffic in this profile.
spring.web.resources.add-mappings=false