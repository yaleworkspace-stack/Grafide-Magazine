# ============================================================
# Grafide API — application.properties
# ============================================================

server.port=${PORT:8080}

# MongoDB — set SPRING_DATA_MONGODB_URI on Render
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/grafide}

# JWT — set JWT_SECRET on Render (any length works, it gets SHA-256 hashed)
jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_STRING_AT_LEAST_32_CHARS}
jwt.expiration-ms=86400000

# File uploads
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB
grafide.upload.dir=uploads/images

# Cloudinary — set CLOUDINARY_URL on Render for persistent image storage
cloudinary.url=${CLOUDINARY_URL:}

# CORS — set GRAFIDE_CORS_ORIGINS on Render to your production domain
grafide.cors.allowed-origins=${GRAFIDE_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:5500,http://localhost:8080}

# Editor code — set GRAFIDE_EDITOR_CODE on Render to your chosen secret
grafide.editor-code=${GRAFIDE_EDITOR_CODE:LOCAL-DEV-EDITOR-CODE}

# Base URL — used in password reset emails; set BASE_URL on Render
# e.g. https://grafide.onrender.com
grafide.base-url=${BASE_URL:http://localhost:8080}

# -------------------------------------------------------
# Email — for password reset (all optional)
# If not configured, reset links are printed to server logs instead.
# Works with Gmail, SendGrid SMTP, Mailgun, etc.
#
# On Render, set these environment variables:
#   MAIL_HOST     e.g. smtp.sendgrid.net
#   MAIL_PORT     e.g. 587
#   MAIL_USERNAME e.g. apikey (SendGrid) or your Gmail address
#   MAIL_PASSWORD e.g. your SMTP password / API key
#   MAIL_FROM     e.g. noreply@grafide.com
# -------------------------------------------------------
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
grafide.mail.from=${MAIL_FROM:noreply@grafide.com}
spring.web.resources.static-locations=file:../Frontend/
spring.mvc.static-path-pattern=/**
