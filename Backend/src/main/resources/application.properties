# ============================================================
# Grafide API — application.properties
# Shared values loaded by ALL profiles.
# Profile-specific overrides live in:
#   application-local.properties   (native Windows dev)
#   application-prod.properties    (Docker / Render cloud)
#
# Active profile is selected at startup:
#   Local  →  mvn spring-boot:run -Dspring-boot.run.profiles=local
#   Docker →  SPRING_PROFILES_ACTIVE=prod  (set in Dockerfile ENV)
# ============================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# ── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}

# ── JWT ─────────────────────────────────────────────────────
jwt.expiration-ms=86400000

# ── File uploads ────────────────────────────────────────────
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB
grafide.upload.dir=uploads/images

# ── Email (optional — shared defaults) ──────────────────────
# If MAIL_HOST is absent, password-reset links fall back to server logs.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
grafide.mail.from=${MAIL_FROM:noreply@grafide.com}
