# ── Grafide Magazine — application.properties (shared / all profiles) ──────────
# Profile-specific files override these values.
# Do NOT put secrets here.

spring.application.name=grafide-magazine

# Server
server.port=8080

# Static frontend (served by Spring in local profile only)
spring.web.resources.static-locations=classpath:/static/

# MongoDB — overridden per profile
spring.data.mongodb.database=grafide

# Multipart file uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# Pagination defaults
grafide.page.default-size=12

# JWT — secret MUST be supplied via environment variable in prod
# In local profile a dev-only fallback is set in application-local.properties
grafide.jwt.expiration-ms=86400000

# Mail — all optional; reset links fall back to console log if absent
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
