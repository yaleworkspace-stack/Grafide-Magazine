<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Manager — Grafide</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
  <link rel="shortcut icon" href="../favicon.ico" />
  <meta name="theme-color" content="#FBF9F4" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/editor.css" />
  <link rel="stylesheet" href="../css/submit.css" />
  <link rel="stylesheet" href="../css/portfolio.css" />
  <style>
    .img-input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 16px;
      background: var(--paper);
    }
    .img-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .img-url-input {
      flex: 1;
      min-width: 0;
      font-family: 'Jost', sans-serif;
      font-size: 0.88rem;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    .img-url-input:focus { border-color: var(--navy); }
    .img-divider {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .img-preview-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .img-preview-strip .cover-preview {
      width: 80px;
      height: 60px;
    }
    .img-preview-strip .cover-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main id="main-content">
    <div class="editor-page">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:36px;">
        <div>
          <h1>Portfolio Manager</h1>
          <p class="editor-sub">Manage the work showcase on the About page.</p>
        </div>
        <a href="/pages/about.html" class="btn ghost sm" target="_blank">View About Page &rarr;</a>
      </div>

      <!-- Add button -->
      <div style="margin-bottom:24px;">
        <button class="btn" id="pf-add-btn">+ Add Work</button>
      </div>

      <!-- Add / Edit form -->
      <div class="edit-panel" id="portfolio-form" style="display:none;">
        <h3 id="pf-form-title">Add Work</h3>
        <div id="pf-err" class="error-text" style="display:none;"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="field"><label>Title</label><input type="text" id="pf-ttl" placeholder="e.g. Spring Editorial 2025" /></div>
          <div class="field"><label>Client / Brand</label><input type="text" id="pf-client" placeholder="e.g. Zara, Self-initiated" /></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="field">
            <label>Category</label>
            <select id="pf-cat">
              <option value="">Select category</option>
              <option value="Editorial">Editorial</option>
              <option value="Photography">Photography</option>
              <option value="Design">Design</option>
              <option value="Campaign">Campaign</option>
            </select>
          </div>
          <div class="field">
            <label>Sort Order <span class="field-hint">(lower = first)</span></label>
            <input type="number" id="pf-sort" value="0" min="0" />
          </div>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="pf-desc" placeholder="Short description of the project…" style="min-height:80px;"></textarea>
        </div>

        <!-- Cover image — file OR URL -->
        <div class="field">
          <label>Cover Image</label>
          <div class="img-input-group">
            <div class="img-input-row">
              <input type="url" class="img-url-input" id="pf-cover-url-input"
                     placeholder="Paste image URL (Cloudinary, Imgur, Google Drive…)" />
              <button class="btn sm ghost" id="pf-cover-url-btn" type="button">Use URL</button>
            </div>
            <div class="img-divider" style="text-align:center;">— or upload a file —</div>
            <input type="file" id="pf-cover-file" accept="image/*" />
          </div>
          <div id="pf-cover-preview" class="img-preview-strip" style="margin-top:10px;"></div>
          <input type="hidden" id="pf-cover-url" />
        </div>

        <!-- Additional images — file OR URL -->
        <div class="field">
          <label>Additional Images</label>
          <div class="img-input-group">
            <div class="img-input-row">
              <input type="url" class="img-url-input" id="pf-extra-url-input"
                     placeholder="Paste image URL and click Add" />
              <button class="btn sm ghost" id="pf-extra-url-btn" type="button">Add URL</button>
            </div>
            <div class="img-divider" style="text-align:center;">— or upload files —</div>
            <input type="file" id="pf-imgs-file" accept="image/*" multiple />
          </div>
          <div class="img-preview-strip cover-previews" id="pf-imgs-preview" style="margin-top:10px;"></div>
        </div>

        <div class="field" style="display:flex;align-items:center;gap:12px;">
          <input type="checkbox" id="pf-featured" style="width:18px;height:18px;" />
          <label for="pf-featured" style="font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;margin:0;">
            Featured (shown first, large card)
          </label>
        </div>

        <div style="display:flex;gap:12px;margin-top:20px;">
          <button class="btn" id="pf-save">Save</button>
          <button class="btn ghost" id="pf-cancel">Cancel</button>
        </div>
      </div>

      <!-- List -->
      <div class="loading"     id="pf-list-loading">Loading&hellip;</div>
      <div class="empty-state" id="pf-list-empty"   style="display:none;">No portfolio items yet. Add your first piece.</div>
      <div class="portfolio-manage-grid" id="pf-list" style="display:none;"></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="../js/shared.js"></script>
  <script src="../js/portfolio-manage.js"></script>
</body>
</html>
