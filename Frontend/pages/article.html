<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Overridden by JS once article loads -->
  <title>Article — Grafide</title>
  <meta name="description" content="Grafide — A space dedicated to the art of fashion, culture, and photography." />

  <meta property="og:type"        content="article" />
  <meta property="og:site_name"   content="Grafide" />
  <meta property="og:title"       content="Article — Grafide" />
  <meta property="og:description" content="" />
  <meta property="og:image"       content="/images/logo.png" />

  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@grafidemagazine" />
  <meta name="twitter:title"       content="Article — Grafide" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:image"       content="/images/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Quill (needed for editor inline image uploads) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet" />

  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
  <link rel="shortcut icon" href="../favicon.ico" />
  <meta name="theme-color" content="#FBF9F4" />

  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/article.css" />
  <link rel="stylesheet" href="../css/home.css" /><!-- for related article cards -->
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main id="main-content">
    <div class="loading" id="article-loading">Loading&hellip;</div>

    <!-- Article content — shown once loaded -->
    <article class="article-page" id="article-page" style="display:none;">

      <a class="back-link" href="javascript:history.back()">&#8592; Back</a>

      <!-- Editor controls (only visible to editors) -->
      <div class="editor-controls" id="editor-controls" style="display:none;">
        <a class="btn ghost sm" id="edit-btn" href="#">Edit</a>
        <button class="btn danger sm" id="delete-btn">Delete</button>
      </div>

      <!-- Cover / slideshow -->
      <div id="cover-slot"></div>

      <!-- Meta -->
      <p class="article-category" id="article-category"></p>
      <h1 class="article-title"   id="article-title"></h1>
      <p class="article-dek"      id="article-dek"></p>
      <p class="article-byline"   id="article-byline"></p>

      <!-- Body -->
      <div class="article-body" id="article-body"></div>
    </article>

    <!-- Related articles -->
    <section class="related-section section" id="related-section" style="display:none;">
      <div class="section-head"><h2>More Articles</h2><div class="line"></div></div>
      <div class="related-grid" id="related-grid"></div>
    </section>

    <div class="empty-state" id="article-error" style="display:none;">
      Article not found. <a href="/index.html" class="back-link" style="margin:0">Go home</a>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/article.js"></script>
</body>
</html>
