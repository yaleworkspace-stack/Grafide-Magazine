<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Magazines — Grafide</title>
  <meta name="description" content="Browse every issue of Grafide Magazine — fashion, culture, photography." />

  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Grafide" />
  <meta property="og:title"       content="Magazines — Grafide" />
  <meta property="og:description" content="Browse every issue of Grafide Magazine." />
  <meta property="og:image"       content="/images/logo.png" />

  <meta name="twitter:card"  content="summary_large_image" />
  <meta name="twitter:site"  content="@grafidemagazine" />
  <meta name="twitter:title" content="Magazines — Grafide" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet" />

  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
  <link rel="shortcut icon" href="../favicon.ico" />
  <meta name="theme-color" content="#FBF9F4" />

  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/magazine.css" />
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main id="main-content">

    <!-- ── LISTING VIEW ── -->
    <div id="view-listing">
      <section class="section">
        <div class="section-head">
          <h2>Magazines</h2>
          <div class="line"></div>
          <!-- Editor: upload button injected by JS -->
          <div id="editor-upload-btn"></div>
        </div>

        <div class="loading"      id="mag-loading">Loading&hellip;</div>
        <div class="empty-state"  id="mag-empty"   style="display:none;">No issues uploaded yet.</div>
        <div class="magazine-grid" id="mag-grid"   style="display:none;"></div>
      </section>
    </div>

    <!-- ── DETAIL VIEW ── -->
    <div id="view-detail" style="display:none;">
      <div class="magazine-detail-page">
        <a class="back-link" id="detail-back" href="/pages/magazine.html">&#8592; Back to Magazines</a>

        <!-- Editor controls -->
        <div class="editor-controls" id="detail-editor-controls" style="display:none;">
          <button class="btn danger sm" id="detail-delete-btn">Delete Issue</button>
        </div>

        <div class="magazine-detail-cover">
          <img id="detail-cover-img" src="/images/logo.png" alt="Magazine cover" />
        </div>
        <h1 class="magazine-detail-title" id="detail-title"></h1>
        <p  class="magazine-detail-dek"   id="detail-dek"></p>
        <div class="article-body"         id="detail-body"></div>
      </div>
    </div>

    <!-- ── UPLOAD VIEW (editor only) ── -->
    <div id="view-upload" style="display:none;">
      <div class="form-page">
        <a class="back-link" href="/pages/magazine.html">&#8592; Back to Magazines</a>
        <h1>Upload Issue</h1>
        <p class="form-sub">Add a new magazine issue — cover image, write-up, and embedded body images.</p>

        <div id="upload-error" class="error-text" style="display:none;"></div>

        <div class="field">
          <label>Title</label>
          <input type="text" id="f-mag-title" placeholder="e.g. Issue 04 — Spring 2025" />
        </div>
        <div class="field">
          <label>Short Description</label>
          <input type="text" id="f-mag-dek" placeholder="One sentence about this issue" />
        </div>
        <div class="field">
          <label>Cover Image</label>
          <input type="file" id="f-mag-cover" accept="image/*" />
        </div>
        <div class="field">
          <label>Body Images <span class="field-hint">(optional — insert via toolbar below)</span></label>
          <input type="file" id="f-mag-body-images" accept="image/*" multiple />
        </div>
        <div class="field">
          <label>Issue Write-up</label>
          <div id="quill-container" class="quill-editor"></div>
        </div>

        <button class="btn" id="upload-submit-btn">Publish Issue</button>
      </div>
    </div>

  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/magazine.js"></script>
</body>
</html>
