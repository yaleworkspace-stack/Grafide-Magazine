<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Grafide</title>
  <meta name="description" content="Get in touch with the Grafide team." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
  <link rel="shortcut icon" href="../favicon.ico" />
  <meta name="theme-color" content="#FBF9F4" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/static.css" />
  <script src='https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js'></script>
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main id="main-content">
    <div class="static-page">
      <p class="static-eyebrow"><span class="diamond"></span> Get In Touch</p>
      <h1>Contact Us</h1>
      <p class="static-lead">
        Have a story idea, collaboration proposal, or just want to say hello?
        We'd love to hear from you. Fill in the form below and we'll get back to you shortly.
      </p>

      <div id="contact-error" class="error-text" style="display:none;"></div>
      <div id="contact-success" class="contact-success">
        Thank you for reaching out! We'll get back to you as soon as possible.
      </div>

      <div class="field">
        <label>Your Name</label>
        <input type="text" id="f-name" placeholder="Full name" />
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="f-email" placeholder="you@email.com" />
      </div>
      <div class="field">
        <label>Subject</label>
        <select id="f-subject">
          <option value="">Select a subject</option>
          <option value="Editorial">Editorial Enquiry</option>
          <option value="Advertising">Advertising &amp; Partnerships</option>
          <option value="Collaboration">Creative Collaboration</option>
          <option value="Press">Press &amp; Media</option>
          <option value="General">General</option>
        </select>
      </div>
      <div class="field">
        <label>Message</label>
        <textarea id="f-message" placeholder="Tell us what's on your mind…"></textarea>
      </div>
      <button class="btn" id="contact-submit-btn">Send Message</button>
    </div>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="../js/shared.js"></script>
  <script src="../js/contact.js"></script>
  <script>initLayout();</script>
</body>
</html>
