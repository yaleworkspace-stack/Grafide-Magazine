<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Grafide</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <meta name="theme-color" content="#FBF9F4" />

  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .notfound-page {
      min-height: calc(100dvh - 72px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .notfound-inner { max-width: 480px; }
    .notfound-code {
      font-family: 'Times New Roman', Times, serif;
      font-size: clamp(5rem, 18vmin, 10rem);
      color: var(--line);
      line-height: 1;
      margin-bottom: 8px;
      font-weight: 400;
    }
    .notfound-title {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.8rem;
      color: var(--navy);
      margin-bottom: 14px;
      font-weight: 400;
    }
    .notfound-dek {
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .notfound-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main id="main-content">
    <div class="notfound-page">
      <div class="notfound-inner">
        <p class="notfound-code">404</p>
        <h1 class="notfound-title">Page Not Found</h1>
        <p class="notfound-dek">
          The page you're looking for has moved, been removed, or never existed.
          Let's get you back on track.
        </p>
        <div class="notfound-actions">
          <a href="/index.html" class="btn">Go Home</a>
          <a href="/pages/fashion.html" class="btn ghost">Browse Fashion</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="js/shared.js"></script>
  <script>initLayout();</script>
</body>
</html>
