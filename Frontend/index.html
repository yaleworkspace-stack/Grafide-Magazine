<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary -->
  <title>Grafide — A space dedicated to the art of fashion.</title>
  <meta name="description" content="Grafide — A space dedicated to the art of fashion, culture, and photography." />

  <!-- Open Graph / social sharing -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Grafide" />
  <meta property="og:title"       content="Grafide — A space dedicated to the art of fashion." />
  <meta property="og:description" content="Grafide — A space dedicated to the art of fashion, culture, and photography." />
  <meta property="og:image"       content="/images/logo.png" />
  <meta property="og:url"         content="" />

  <!-- Twitter / X card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@grafide" />
  <meta name="twitter:title"       content="Grafide — A space dedicated to the art of fashion." />
  <meta name="twitter:description" content="Grafide — A space dedicated to the art of fashion, culture, and photography." />
  <meta name="twitter:image"       content="/images/logo.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Quill rich text editor -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet" />

  <!-- favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#ffffff" />

  <!-- Grafide styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <section id="article-detail-view" style="display:none;">
      <div class="article-detail-container">
        <button id="article-back-btn" class="back-btn" onclick="history.back()">← Back</button>
        <div id="article-detail-cover-container" class="article-detail-cover"></div>
        <div class="article-detail-meta">
          <span id="article-detail-category" class="article-category-tag"></span>
          <h1 id="article-detail-title"></h1>
          <p id="article-detail-author" class="article-author"></p>
        </div>
        <div id="article-detail-body" class="article-body-content"></div>
      </div>

      <!-- Related articles below -->
      <div class="related-articles-section">
        <h3>More Articles</h3>
        <div id="related-articles-grid" class="articles-grid"></div>
      </div>
    </section>
    <header class="site-header header" id="site-header">
      <a class="logo" data-nav="home" href="/" aria-label="Grafide home">
        <img src="/images/logo.png" alt="Grafide" class="logo-img" />
      </a>
      <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
      </button>
      <nav id="main-nav" class="main-nav nav"><button class="linklike" data-view="podcast">PODCAST</button></nav>
    </header>
    <main id="main-content"></main>
    <footer class="footer" id="site-footer"></footer>
  </div>

  <!-- Quill must load before grafide.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
  <script src="js/grafide.js"></script>
</body>
</html>
