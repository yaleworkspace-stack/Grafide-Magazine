version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: grafide-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grafide-backend-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/grafide
      - JWT_SECRET=local-dev-secret-change-in-production
      - GRAFIDE_EDITOR_CODE=LOCAL-DEV-EDITOR-CODE
      - GRAFIDE_CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:5500
      - BASE_URL=http://localhost:8080
      - CLOUDINARY_URL=
      - PORT=8080

    depends_on:
      - mongodb

volumes:
  mongo-data: